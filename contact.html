<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Iron Lantern Studios™ | BrickedMyPortfolio.com</title>
  <meta
    name="description"
    content="Get in touch with Jason Harvey of Iron Lantern Studios™ via the contact form."
  />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="media/favicon.ico" />
</head>
<body>
  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo-circle">
      <img src="media/logo.png" alt="Iron Lantern Studios Logo" />
    </a>
    <nav class="nav-center">
      <a href="about.html">About</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="games.html">Games</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html">Contact</a>
    </nav>
    <div class="brick-icon" onclick="crackScreen()" title="Break the screen">
      <img src="media/brick-icon.png" alt="Brick Icon" />
    </div>
  </header>

  <!-- PAGE TITLE -->
  <h1 class="site-title">Contact</h1>

  <!-- CONTACT FORM -->
  <section class="contact-section">
    <form
      class="contact-form"
      action="mailto:Jason.harvey@brickedmyportfolio.com"
      method="POST"
      enctype="text/plain"
    >
      <input
        type="text"
        name="name"
        placeholder="Your Name"
        required
      />
      <input
        type="email"
        name="email"
        placeholder="Your Email"
        required
      />
      <textarea
        name="message"
        placeholder="Your Message"
        rows="6"
      ></textarea>
      <button type="submit" class="btn-pink">Send Message</button>
    </form>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>
      © 2025 BrickedMyPortfolio.com | Iron Lantern Studios™ LLC. All
      rights reserved.
    </p>
    <p>
      <a href="mailto:Jason.harvey@brickedmyportfolio.com"
        >Jason.harvey@brickedmyportfolio.com</a
      >
    </p>
    <p>
      <a href="privacy.html">Privacy Policy</a> |
      <a href="terms.html">Terms of Use</a>
    </p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
