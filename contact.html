<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - brickedmyportfolio.com</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo-circle">🎮</a>
        <nav class="nav-center">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="games.html">Games</a>
            <a href="shop.html">Shop</a>
            <a href="contact.html" class="current">Contact</a>
        </nav>
        <button id="brick-icon"></button>
    </header>

    <div class="container">
        <h1 class="page-title">Contact</h1>
        <p class="page-subtitle">Get in touch (if you dare)</p>
        
        <div class="contact-form">
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message here..." required rows="6"></textarea>
                </div>
                
                <button type="submit" class="preview-button">Send Message</button>
            </form>
            
            <p class="email-contact">Or email me directly at: <code>404@brickedmail.dev</code></p>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
        <div class="footer-social">
            <a href="https://youtube.com" target="_blank">YouTube</a>
            <a href="https://twitter.com" target="_blank">Twitter</a>
            <a href="#" target="_blank">Discord</a>
        </div>
        <div class="copyright">© 2025 brickedmyportfolio.com | IronLanternStudios</div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
